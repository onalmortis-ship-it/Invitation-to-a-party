<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Spin-off of "Project: Event invite"</title>
        <style>
            body {
                background-color: azure;
                font-family: sans-serif;
            }
            .cont {
                background-color: white;
                width: 400px;
                height: 300px;
                overflow: hidden;
                margin: 40px auto;
                border: 5px solid purple;
                border-radius: 15px;
                position: relative;
            }
            .decor {
                position: absolute;
                top: 10px;
                right: 10px;
                font-size: 30px;
            }
            h1 {
                text-align: center;
                color: blue;
                margin-bottom: 20px;
            }
            p, ul {
                margin-left: 20px;
                color: white blue;
            }
            .high {
                color: pink;
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <div class="cont">
            <div class="decor">🎈</div>
            
            <h1>Birthday <span class="high">Party</span></h1>
            
            <p>You are invited to my celebration, 67th birthday!</p>
            
            <ul>
                <li><strong>Time:</strong> This Saturday, 18:00.</li>
                <li><strong>Location:</strong> My Garden, Avenue st. 67.</li>
            </ul>
        </div>
    </body>
</html>
